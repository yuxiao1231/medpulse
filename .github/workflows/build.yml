name: Build MedPulse

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Decode Keystore from Secrets
      run: |
        $keystoreBytes = [System.Convert]::FromBase64String("${{ secrets.RELEASE_KEY_BASE64 }}")
        [System.IO.File]::WriteAllBytes("forandroidbuild/app/release.jks", $keystoreBytes)
      shell: pwsh

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: password123
        KEY_ALIAS: key0
        KEY_PASSWORD: password123
      run: cd forandroidbuild && gradle assembleRelease

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MedPulse-Android
        path: forandroidbuild/app/build/outputs/apk/release/app-release.apk

  create-release:
    needs: build-android
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download Android Artifact
      uses: actions/download-artifact@v4
      with:
        name: MedPulse-Android

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        draft: false
        name: "MedPulse Auto Release (Build ${{ github.run_number }})"
        tag_name: "v1.0.0-b${{ github.run_number }}"
        files: |
          app-release.apk
          MedPulse.exe
        body: |
          **Automated Build from GitHub Actions**
          - 📱 Android APK attached
          - 💻 Windows EXE attached (XP & Win11 Compatible)
