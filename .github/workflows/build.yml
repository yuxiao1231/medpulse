name: Build MedPulse

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build executable
      run: pyinstaller --noconfirm --clean medpulse.spec

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MedPulse-Windows
        path: dist/MedPulse.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Decode Keystore from Secrets
      run: |
        $keystoreBytes = [System.Convert]::FromBase64String("${{ secrets.RELEASE_KEY_BASE64 }}")
        [System.IO.File]::WriteAllBytes("forandroidbuild/app/release.jks", $keystoreBytes)
      shell: pwsh

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: password123
        KEY_ALIAS: key0
        KEY_PASSWORD: password123
      run: cd forandroidbuild && gradle assembleRelease

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MedPulse-Android
        path: forandroidbuild/app/build/outputs/apk/release/app-release.apk
