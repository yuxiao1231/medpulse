name: Build MedPulse

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-2019
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Python 3.4 (x86) for Windows XP Compatibility
      run: |
        Invoke-WebRequest -Uri "https://www.python.org/ftp/python/3.4.4/python-3.4.4.msi" -OutFile "python3.4.msi"
        Start-Process -Wait -FilePath msiexec.exe -ArgumentList "/i python3.4.msi /quiet InstallAllUsers=1 PrependPath=1 TargetDir=C:\Python34"
        echo "C:\Python34" >> $env:GITHUB_PATH
        echo "C:\Python34\Scripts" >> $env:GITHUB_PATH
      shell: pwsh

    - name: Install dependencies
      run: |
        python -m pip install setuptools==43.0.0
        python -m pip install "pyinstaller==3.6"
      shell: pwsh

    - name: Build executable
      run: pyinstaller --noconfirm --clean medpulse.spec

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MedPulse-Windows
        path: dist/MedPulse.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Decode Keystore from Secrets
      run: |
        $keystoreBytes = [System.Convert]::FromBase64String("${{ secrets.RELEASE_KEY_BASE64 }}")
        [System.IO.File]::WriteAllBytes("forandroidbuild/app/release.jks", $keystoreBytes)
      shell: pwsh

    - name: Build Release APK
      env:
        KEYSTORE_PASSWORD: password123
        KEY_ALIAS: key0
        KEY_PASSWORD: password123
      run: cd forandroidbuild && gradle assembleRelease

    - name: Upload Android Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MedPulse-Android
        path: forandroidbuild/app/build/outputs/apk/release/app-release.apk
